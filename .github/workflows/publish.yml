name: Publish

on:
  workflow_dispatch:
    inputs:
      repository:
        description: Target package index
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      dist-artifact-name: python-package-distributions
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip -e .[dev]

      - name: Run CI release gate
        run: python scripts/check_release.py --profile ci

      - name: Smoke test wheel install
        run: |
          python -m venv .smoke-wheel
          .smoke-wheel/bin/python -m pip install --upgrade pip
          .smoke-wheel/bin/python -m pip install dist/*.whl
          .smoke-wheel/bin/python scripts/check_installed_package.py \
            --sample-path examples/samples/hwpx/math_template_2_formula_fixed.hwpx \
            --output-dir build/publish-smoke-wheel

      - name: Smoke test sdist install
        run: |
          python -m venv .smoke-sdist
          .smoke-sdist/bin/python -m pip install --upgrade pip
          .smoke-sdist/bin/python -m pip install dist/*.tar.gz
          .smoke-sdist/bin/python scripts/check_installed_package.py \
            --sample-path examples/samples/hwpx/math_template_2_formula_fixed.hwpx \
            --output-dir build/publish-smoke-sdist

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  publish-testpypi:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.repository == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/jakal-hwpx
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.repository == 'pypi') }}
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/jakal-hwpx
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
