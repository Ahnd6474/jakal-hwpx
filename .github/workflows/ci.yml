name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Run test suite
        run: tox -e py

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tox
        run: python -m pip install --upgrade pip tox

      - name: Build distribution and validate metadata
        run: tox -e pkg

      - name: Smoke test wheel install
        run: |
          python -m venv .smoke-wheel
          .smoke-wheel/bin/python -m pip install --upgrade pip
          .smoke-wheel/bin/python -m pip install dist/*.whl
          .smoke-wheel/bin/python scripts/check_installed_package.py \
            --sample-path examples/samples/hwpx/math_template_2_formula_fixed.hwpx \
            --output-dir build/ci-smoke-wheel

      - name: Smoke test sdist install
        run: |
          python -m venv .smoke-sdist
          .smoke-sdist/bin/python -m pip install --upgrade pip
          .smoke-sdist/bin/python -m pip install dist/*.tar.gz
          .smoke-sdist/bin/python scripts/check_installed_package.py \
            --sample-path examples/samples/hwpx/math_template_2_formula_fixed.hwpx \
            --output-dir build/ci-smoke-sdist
