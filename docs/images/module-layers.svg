<svg xmlns="http://www.w3.org/2000/svg" width="920" height="310" viewBox="0 0 920 310" role="img" aria-labelledby="title desc">
  <title id="title">jakal_hwpx 모듈 레이어</title>
  <desc id="desc">HancomDocument가 기본 편집 모델이고 HwpxDocument와 HwpDocument가 포맷별 하위 레이어인 구조</desc>
  <rect width="920" height="310" fill="#f8fafc"/>
  <rect x="24" y="24" width="872" height="262" rx="18" fill="#ffffff" stroke="#d7dde8"/>
  <g font-family="Arial, sans-serif">
    <text x="460" y="58" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">사용 코드는 위에서 시작합니다</text>
    <rect x="310" y="82" width="300" height="68" rx="14" fill="#eefbea" stroke="#80b36a"/>
    <text x="460" y="112" text-anchor="middle" font-size="22" font-weight="700" fill="#24552a">HancomDocument</text>
    <text x="460" y="136" text-anchor="middle" font-size="14" fill="#36543a">기본 편집 모델</text>
    <path d="M410 152 V186" fill="none" stroke="#6b7280" stroke-width="3"/>
    <path d="M510 152 V186" fill="none" stroke="#6b7280" stroke-width="3"/>
    <path d="M402 180 L410 196 L418 180 Z" fill="#6b7280"/>
    <path d="M502 180 L510 196 L518 180 Z" fill="#6b7280"/>
    <rect x="178" y="196" width="240" height="58" rx="12" fill="#e8f3ff" stroke="#8bb7e0"/>
    <text x="298" y="223" text-anchor="middle" font-size="19" font-weight="700" fill="#153e75">HwpxDocument</text>
    <text x="298" y="245" text-anchor="middle" font-size="13" fill="#42526b">HWPX package와 XML</text>
    <rect x="502" y="196" width="240" height="58" rx="12" fill="#fff4df" stroke="#e0aa54"/>
    <text x="622" y="223" text-anchor="middle" font-size="19" font-weight="700" fill="#7a4a09">HwpDocument</text>
    <text x="622" y="245" text-anchor="middle" font-size="13" fill="#6b4d1f">HWP binary 문서</text>
    <text x="460" y="274" text-anchor="middle" font-size="13" fill="#4b5563">HwpBinaryDocument와 HwpHwpxBridge는 조사, 검증, 변환 실험용 보조 도구입니다.</text>
  </g>
</svg>
