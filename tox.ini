[tox]
env_list = py311, py312, py313, pkg, release
skip_missing_interpreters = true
isolated_build = true

[testenv]
description = Run the pytest suite with {basepython}
extras = test
setenv =
    TMP = {toxworkdir}{/}.tmp
    TEMP = {toxworkdir}{/}.tmp
    TMPDIR = {toxworkdir}{/}.tmp
    PYTEST_ADDOPTS = --basetemp={toxworkdir}{/}.pytest-tmp -o cache_dir={toxworkdir}{/}.pytest_cache
commands = pytest -q

[testenv:pkg]
description = Build release artifacts and verify PyPI metadata
extras = release
setenv =
    TMP = {toxworkdir}{/}.tmp
    TEMP = {toxworkdir}{/}.tmp
    TMPDIR = {toxworkdir}{/}.tmp
commands =
    python -m build --sdist --wheel --outdir {envtmpdir}/dist --no-isolation
    python -m twine check {envtmpdir}/dist/*

[testenv:release]
description = Run the full local release validation workflow
extras = release
setenv =
    TMP = {toxworkdir}{/}.tmp
    TEMP = {toxworkdir}{/}.tmp
    TMPDIR = {toxworkdir}{/}.tmp
commands = python scripts/check_release.py
